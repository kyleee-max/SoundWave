name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin duplicate class conflict
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                      details.because 'Force consistent Kotlin version'
                  }
              }
          }
          GRADLE

      - name: Patch MainActivity for background audio
        run: |
          MAIN_ACTIVITY=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "Found: $MAIN_ACTIVITY"
          cat > "$MAIN_ACTIVITY" << 'JAVA'
          package com.soundwave.app;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }

              @Override
              public void onResume() {
                  super.onResume();
                  WebView webView = getBridge().getWebView();
                  WebSettings settings = webView.getSettings();
                  settings.setMediaPlaybackRequiresUserGesture(false);
              }
          }
          JAVA

      - name: Patch AndroidManifest for background audio service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Tambah permission FOREGROUND_SERVICE dan WAKE_LOCK sebelum </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n</manifest>|' "$MANIFEST"
          # Tambah android:keepScreenOn dan background audio support di application tag
          sed -i 's|<application|<application android:allowAudioPlaybackCapture="true"|' "$MANIFEST"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundwave-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
